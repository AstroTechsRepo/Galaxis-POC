# ============================================================
# Galaxis POC — Stack IAM (déploiement Ansible séparé)
# Crée le réseau iam-net partagé avec le proxy.
# ============================================================
name: galaxis-iam

networks:
  iam-net:
    name: galaxis-iam-net
    driver: bridge

volumes:
  iam-db-data:

services:
  iam-db:
    image: postgres:16-alpine
    container_name: galaxis-iam-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:?KC_DB_PASSWORD requis}
    volumes:
      - iam-db-data:/var/lib/postgresql/data
    networks: [iam-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: galaxis-keycloak
    restart: unless-stopped
    depends_on:
      iam-db:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://iam-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:?KC_BOOTSTRAP_ADMIN_PASSWORD requis}
      KC_HTTP_RELATIVE_PATH: /iam
      KC_PROXY: edge
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
    command: start --optimized --http-enabled=true
    networks: [iam-net]
