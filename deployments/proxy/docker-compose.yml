# ============================================================
# Galaxis POC — Stack PROXY (Caddy reverse proxy unique)
# Connecté aux 3 réseaux applicatifs.
# ============================================================
name: galaxis-proxy

networks:
  iam-net:
    name: galaxis-iam-net
    external: true
  app-net:
    name: galaxis-app-net
    external: true
  services-net:
    name: galaxis-services-net
    external: true

services:
  proxy:
    image: caddy:2.8-alpine
    container_name: galaxis-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ../../Caddyfile:/etc/caddy/Caddyfile:ro
    networks: [iam-net, app-net, services-net]
