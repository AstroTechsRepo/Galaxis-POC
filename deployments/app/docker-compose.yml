# ============================================================
# Galaxis POC — Stack APP (Laravel + React + Postgres + Redis)
# ============================================================
name: galaxis-app

networks:
  app-net:
    name: galaxis-app-net
    driver: bridge
  iam-net:
    name: galaxis-iam-net
    external: true

volumes:
  app-db-data:
  app-redis-data:

services:
  app-db:
    image: postgres:16-alpine
    container_name: galaxis-app-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: galaxis
      POSTGRES_USER: galaxis
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:?APP_DB_PASSWORD requis}
    volumes:
      - app-db-data:/var/lib/postgresql/data
    networks: [app-net]

  app-redis:
    image: redis:7-alpine
    container_name: galaxis-app-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD requis}"]
    volumes:
      - app-redis-data:/data
    networks: [app-net]

  app-php:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: galaxis-app-php
    restart: unless-stopped
    depends_on:
      - app-db
      - app-redis
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${PUBLIC_ORIGIN:-http://localhost:8080}
      DB_HOST: app-db
      DB_DATABASE: galaxis
      DB_USERNAME: galaxis
      DB_PASSWORD: ${APP_DB_PASSWORD}
      REDIS_HOST: app-redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KC_BASE_INTERNAL: http://keycloak:8080/iam
      KC_BASE_PUBLIC: ${PUBLIC_ORIGIN:-http://localhost:8080}/iam
      KC_CLIENT_ID: ${KC_CLIENT_ID:-galaxis-portal}
    networks: [app-net, iam-net]

  app-front:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        VITE_PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:8080}
    container_name: galaxis-app-front
    restart: unless-stopped
    networks: [app-net]
