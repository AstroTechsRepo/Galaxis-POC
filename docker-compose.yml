# ============================================================
# Galaxis POC v1.1 — Architecture 100% conteneurisée
# 11 conteneurs · 3 Caddy frontaux · 3 réseaux Docker isolés
# HTTPS via CA locale Caddy (tls internal)
# Tous les ports bindés sur 127.0.0.1 (loopback uniquement)
# ============================================================
# Source de vérité : slides 10, 12, 13, 15, A01 de la soutenance.
# Conforme au cadrage Phase C — refactor de l'archi infra.
# ============================================================

name: galaxis

# ----------------------------------------------------------------
# 3 RÉSEAUX DOCKER ISOLÉS (cf. slide 10)
# - iam-net      : caddy-iam + keycloak + keycloak-db + app-php
# - app-net      : app-caddy + app-php + app-db + app-redis
# - services-net : caddy-services + vaultwarden + nextcloud + nextcloud-db
#
# app-php est l'unique service multi-réseau (app-net + iam-net) :
# c'est le PONT JWT (cf. slide 12) — Laravel doit appeler le JWKS
# de Keycloak pour valider les tokens RS256.
# ----------------------------------------------------------------
networks:
  galaxis-iam-net:
    name: galaxis-iam-net
    driver: bridge
  galaxis-app-net:
    name: galaxis-app-net
    driver: bridge
  galaxis-services-net:
    name: galaxis-services-net
    driver: bridge

# ----------------------------------------------------------------
# VOLUMES PERSISTANTS
# ----------------------------------------------------------------
volumes:
  # Données applicatives
  keycloak-db-data:
  app-db-data:
  app-redis-data:
  nextcloud-db-data:
  vaultwarden-data:
  nextcloud-data:

  # CA et configuration Caddy (un par tier — persiste les certs auto-générés)
  caddy-iam-data:
  caddy-iam-config:
  caddy-app-data:
  caddy-app-config:
  caddy-services-data:
  caddy-services-config:

  # Build statique React monté en RO par app-caddy → /srv/frontend
  galaxis-frontend-build:

  # Sentinel d'idempotence du bootstrap (configure-keycloak + migrations + seed)
  galaxis-bootstrap-state:

services:

  # ============================================================
  # ╔═════════════════════════════════════════════════════════╗
  # ║  TIER 1 — IAM  (réseau galaxis-iam-net)                 ║
  # ║  caddy-iam · keycloak · keycloak-db                     ║
  # ╚═════════════════════════════════════════════════════════╝
  # ============================================================

  caddy-iam:
    image: caddy:2-alpine
    container_name: caddy-iam
    restart: unless-stopped
    ports:
      - "127.0.0.1:8443:443"
    volumes:
      - ./deployments/caddy/Caddyfile.iam:/etc/caddy/Caddyfile:ro
      - caddy-iam-data:/data
      - caddy-iam-config:/config
    networks: [galaxis-iam-net]
    depends_on:
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fksS https://localhost/ -o /dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    restart: unless-stopped
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:?KC_DB_PASSWORD requis}
      # Bootstrap admin (créé au premier démarrage uniquement)
      KEYCLOAK_ADMIN: ${KC_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:?KC_ADMIN_PASSWORD requis}
      # Configuration derrière reverse proxy Caddy
      KC_PROXY: edge
      KC_HOSTNAME: "https://localhost:8443"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    command: ["start"]
    networks: [galaxis-iam-net]
    healthcheck:
      # /health/ready est exposé sur le port management 9000 (Keycloak 25+)
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q 'UP' <&3"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 90s

  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USERNAME:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks: [galaxis-iam-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USERNAME:-keycloak} -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================================
  # ╔═════════════════════════════════════════════════════════╗
  # ║  TIER 2 — APP  (réseau galaxis-app-net)                 ║
  # ║  app-caddy · app-php (PONT) · app-db · app-redis        ║
  # ║  + frontend-builder (one-shot, dépose dans volume)      ║
  # ╚═════════════════════════════════════════════════════════╝
  # ============================================================

  app-caddy:
    image: caddy:2-alpine
    container_name: app-caddy
    restart: unless-stopped
    ports:
      - "127.0.0.1:9443:443"
    volumes:
      - ./deployments/caddy/Caddyfile.app:/etc/caddy/Caddyfile:ro
      - ./backend:/srv/api:ro              # Caddy a besoin de voir public/index.php pour le php_fastcgi
      - galaxis-frontend-build:/srv/frontend:ro
      - caddy-app-data:/data
      - caddy-app-config:/config
    networks: [galaxis-app-net]
    depends_on:
      app-php:
        condition: service_started
      frontend-builder:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fksS https://localhost/ -o /dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  app-php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: galaxis/app-php:1.1
    container_name: app-php
    restart: unless-stopped
    depends_on:
      app-db:
        condition: service_healthy
      app-redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY:?APP_KEY requis (php artisan key:generate)}
      APP_URL: ${APP_URL:-https://localhost:9443}
      LOG_CHANNEL: stderr
      # DB applicative (réseau app-net)
      DB_CONNECTION: pgsql
      DB_HOST: app-db
      DB_PORT: 5432
      DB_DATABASE: galaxis
      DB_USERNAME: ${APP_DB_USERNAME:-galaxis}
      DB_PASSWORD: ${APP_DB_PASSWORD:?APP_DB_PASSWORD requis}
      # Cache JWKS + sessions (réseau app-net)
      REDIS_HOST: app-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD requis}
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      # OIDC — pont vers Keycloak (réseau iam-net via le second NIC)
      KC_REALM: ${KC_REALM:-galaxis}
      KC_BASE_INTERNAL: http://keycloak:8080
      KC_BASE_PUBLIC: ${KC_BASE_PUBLIC:-https://localhost:8443}
      KC_CLIENT_ID: ${KC_CLIENT_ID:-galaxis-portal}
      JWKS_CACHE_TTL: 300
    # Pas de bind mount en mode démo/prod : l'image contient le vendor + le code.
    # Pour le dev local (hot reload), ajouter : `volumes: ["./backend:/var/www/html"]`
    # ⚡ app-php est le seul service MULTI-RÉSEAU : pont JWT (cf. slide 12)
    networks: [galaxis-app-net, galaxis-iam-net]
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 >/dev/null 2>&1 || php -r 'exit(0);'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  app-db:
    image: postgres:16-alpine
    container_name: app-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: galaxis
      POSTGRES_USER: ${APP_DB_USERNAME:-galaxis}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
    volumes:
      - app-db-data:/var/lib/postgresql/data
    networks: [galaxis-app-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USERNAME:-galaxis} -d galaxis"]
      interval: 10s
      timeout: 5s
      retries: 10

  app-redis:
    image: redis:7-alpine
    container_name: app-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--save", "60", "1"]
    volumes:
      - app-redis-data:/data
    networks: [galaxis-app-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------------
  # frontend-builder : conteneur ONE-SHOT (exit après build)
  # Build le React → dépose dans le volume galaxis-frontend-build
  # qu'app-caddy monte en RO sur /srv/frontend.
  # ----------------------------------------------------------------
  frontend-builder:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_KC_URL: ${VITE_KC_URL:-https://localhost:8443}
        VITE_API_URL: ${VITE_API_URL:-https://localhost:9443/api}
        VITE_KC_REALM: ${KC_REALM:-galaxis}
        VITE_KC_CLIENT_ID: ${KC_CLIENT_ID:-galaxis-portal}
    image: galaxis/frontend-builder:1.1
    container_name: frontend-builder
    restart: "no"
    volumes:
      - galaxis-frontend-build:/output
    networks: [galaxis-app-net]
    # L'image fait `cp -r /app/dist/* /output/` puis exit 0.

  # ============================================================
  # ╔═════════════════════════════════════════════════════════╗
  # ║  TIER 3 — SERVICES  (réseau galaxis-services-net)       ║
  # ║  caddy-services · vaultwarden · nextcloud · nextcloud-db║
  # ╚═════════════════════════════════════════════════════════╝
  # ============================================================

  caddy-services:
    image: caddy:2-alpine
    container_name: caddy-services
    restart: unless-stopped
    ports:
      - "127.0.0.1:10443:443"      # → vaultwarden
      - "127.0.0.1:11443:444"      # → nextcloud
    volumes:
      - ./deployments/caddy/Caddyfile.services:/etc/caddy/Caddyfile:ro
      - caddy-services-data:/data
      - caddy-services-config:/config
    networks: [galaxis-services-net]
    depends_on:
      vaultwarden:
        condition: service_started
      nextcloud:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fksS https://localhost/ -o /dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: https://localhost:10443
      SIGNUPS_ALLOWED: "false"
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN:-}
      WEBSOCKET_ENABLED: "true"
      ROCKET_PORT: 80
      LOG_LEVEL: info
    volumes:
      - vaultwarden-data:/data
    networks: [galaxis-services-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80/alive || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  nextcloud:
    image: nextcloud:apache
    container_name: nextcloud
    restart: unless-stopped
    depends_on:
      nextcloud-db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: nextcloud-db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: ${NEXTCLOUD_DB_USERNAME:-nextcloud}
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD:?NEXTCLOUD_DB_PASSWORD requis}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:?NEXTCLOUD_ADMIN_PASSWORD requis}
      NEXTCLOUD_TRUSTED_DOMAINS: "localhost localhost:11443"
      OVERWRITEPROTOCOL: https
      OVERWRITEHOST: "localhost:11443"
      TRUSTED_PROXIES: "172.16.0.0/12 10.0.0.0/8 192.168.0.0/16"
    volumes:
      - nextcloud-data:/var/www/html
    networks: [galaxis-services-net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/status.php"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nextcloud-db:
    image: postgres:16-alpine
    container_name: nextcloud-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: ${NEXTCLOUD_DB_USERNAME:-nextcloud}
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
    volumes:
      - nextcloud-db-data:/var/lib/postgresql/data
    networks: [galaxis-services-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NEXTCLOUD_DB_USERNAME:-nextcloud} -d nextcloud"]
      interval: 10s
      timeout: 5s
      retries: 10
