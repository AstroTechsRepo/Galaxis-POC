# ============================================================
# Galaxis POC — docker-compose racine (orchestration unifiée)
# 11 conteneurs · 3 réseaux isolés · 1 reverse proxy
# Bind sur 127.0.0.1:8080 (loopback uniquement)
# ============================================================

name: galaxis

# ----------------------------------------------------------------
# 3 réseaux Docker isolés (cf. slide 10)
# - iam-net      : Keycloak + sa Postgres
# - app-net      : Laravel + sa Postgres + Redis + Front + Caddy
# - services-net : Vaultwarden + Nextcloud + sa Postgres + Caddy
# - app-php est sur app-net ET iam-net (validation JWT vs JWKS)
# - Caddy est sur les 3 réseaux (routeur unique)
# ----------------------------------------------------------------
networks:
  iam-net:
    name: galaxis-iam-net
    driver: bridge
  app-net:
    name: galaxis-app-net
    driver: bridge
  services-net:
    name: galaxis-services-net
    driver: bridge

volumes:
  iam-db-data:
  app-db-data:
  app-redis-data:
  vaultwarden-data:
  nextcloud-data:
  nextcloud-db-data:

services:
  # ============================================================
  # TIER 1 — IAM (réseau iam-net)
  # ============================================================
  iam-db:
    image: postgres:16-alpine
    container_name: galaxis-iam-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:?KC_DB_PASSWORD requis}
    volumes:
      - iam-db-data:/var/lib/postgresql/data
    networks: [iam-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: galaxis-keycloak
    restart: unless-stopped
    depends_on:
      iam-db:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://iam-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:?KC_BOOTSTRAP_ADMIN_PASSWORD requis}
      KC_HTTP_RELATIVE_PATH: /iam
      KC_PROXY: edge
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
    command: start --optimized --http-enabled=true
    networks: [iam-net]
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /iam/health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q 'UP' <&3"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ============================================================
  # TIER 2 — APP (réseau app-net, + app-php ponte vers iam-net)
  # ============================================================
  app-db:
    image: postgres:16-alpine
    container_name: galaxis-app-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: galaxis
      POSTGRES_USER: galaxis
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:?APP_DB_PASSWORD requis}
    volumes:
      - app-db-data:/var/lib/postgresql/data
    networks: [app-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U galaxis -d galaxis"]
      interval: 10s
      timeout: 5s
      retries: 10

  app-redis:
    image: redis:7-alpine
    container_name: galaxis-app-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD requis}", "--save", "60", "1"]
    volumes:
      - app-redis-data:/data
    networks: [app-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 10

  app-php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: galaxis-app-php
    restart: unless-stopped
    depends_on:
      app-db:
        condition: service_healthy
      app-redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY:?APP_KEY requis - lance: docker compose exec app-php php artisan key:generate}
      APP_URL: ${PUBLIC_ORIGIN:-http://localhost:8080}
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: app-db
      DB_PORT: 5432
      DB_DATABASE: galaxis
      DB_USERNAME: galaxis
      DB_PASSWORD: ${APP_DB_PASSWORD}
      REDIS_HOST: app-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      # OIDC / Keycloak
      KC_REALM: ${KC_REALM:-galaxis}
      KC_BASE_INTERNAL: ${KC_BASE_INTERNAL:-http://keycloak:8080/iam}
      KC_BASE_PUBLIC: ${KC_BASE_PUBLIC:-http://localhost:8080/iam}
      KC_CLIENT_ID: ${KC_CLIENT_ID:-galaxis-portal}
      JWKS_CACHE_TTL: 300
    networks: [app-net, iam-net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  app-front:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
        VITE_KC_BASE: /iam
        VITE_KC_REALM: ${KC_REALM:-galaxis}
        VITE_KC_CLIENT_ID: ${KC_CLIENT_ID:-galaxis-portal}
        VITE_PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:8080}
    container_name: galaxis-app-front
    restart: unless-stopped
    networks: [app-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ============================================================
  # TIER 3 — SERVICES (réseau services-net)
  # ============================================================
  vaultwarden:
    image: vaultwarden/server:1.32.4
    container_name: galaxis-vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: ${PUBLIC_ORIGIN:-http://localhost:8080}/vault
      SIGNUPS_ALLOWED: ${VAULTWARDEN_SIGNUPS_ALLOWED:-false}
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN:-}
      # Vaultwarden tourne en HTTP derrière Caddy
      ROCKET_PORT: 80
      WEBSOCKET_ENABLED: "true"
      LOG_LEVEL: warn
    volumes:
      - vaultwarden-data:/data
    networks: [services-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/alive"]
      interval: 20s
      timeout: 5s
      retries: 5

  nextcloud-db:
    image: postgres:16-alpine
    container_name: galaxis-nextcloud-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD:?NEXTCLOUD_DB_PASSWORD requis}
    volumes:
      - nextcloud-db-data:/var/lib/postgresql/data
    networks: [services-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud -d nextcloud"]
      interval: 10s
      timeout: 5s
      retries: 10

  nextcloud:
    image: nextcloud:30-apache
    container_name: galaxis-nextcloud
    restart: unless-stopped
    depends_on:
      nextcloud-db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: nextcloud-db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:?NEXTCLOUD_ADMIN_PASSWORD requis}
      NEXTCLOUD_TRUSTED_DOMAINS: "localhost"
      OVERWRITEWEBROOT: /cloud
      OVERWRITEHOST: ${PUBLIC_HOST:-localhost:8080}
      OVERWRITEPROTOCOL: http
      TRUSTED_PROXIES: "172.16.0.0/12 10.0.0.0/8 192.168.0.0/16"
    volumes:
      - nextcloud-data:/var/www/html
    networks: [services-net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/status.php"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================================
  # TIER 0 — PROXY (Caddy, branché sur les 3 réseaux)
  # ============================================================
  proxy:
    image: caddy:2.8-alpine
    container_name: galaxis-proxy
    restart: unless-stopped
    # Bind UNIQUEMENT sur loopback : l'accès passe par le tunnel SSH
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks: [iam-net, app-net, services-net]
    depends_on:
      keycloak:
        condition: service_healthy
      app-front:
        condition: service_healthy
      app-php:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 20s
      timeout: 5s
      retries: 5
