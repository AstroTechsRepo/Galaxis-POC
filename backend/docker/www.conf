; Galaxis POC v1.1 — pool php-fpm
[www]
user = www-data
group = www-data
listen = 0.0.0.0:9000
;listen.allowed_clients =
pm = dynamic
pm.max_children = 16
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500

; Endpoints diagnostic exposés en interne
pm.status_path = /status
ping.path = /ping
ping.response = pong

; Logs vers stdout/stderr (capté par Docker)
catch_workers_output = yes
decorate_workers_output = no
clear_env = no
